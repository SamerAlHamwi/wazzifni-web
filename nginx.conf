server {
    listen 80;
    server_name web.wazzifni.net;

    root /usr/share/nginx/html;
    index index.html;

    # Support for the main website (Landing Page)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Support for the course application
    # This ensures that /course/ and its sub-paths work correctly with the SPA
    location /course/ {
        # Using root instead of alias to avoid path resolution issues with try_files
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /course/index.html;
    }

    # API Proxy for the main site
    location /api-proxy/ {
        set $api_backend "https://ad.wazzifni.net/api/";
        proxy_pass $api_backend;
        proxy_set_header Host ad.wazzifni.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /wazzifni-proxy/ {
            proxy_pass https://api.wazzifni.net/api/;
            proxy_set_header Host api.wazzifni.net;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    # Optional: Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error handling
    error_page 404 /index.html;
}
