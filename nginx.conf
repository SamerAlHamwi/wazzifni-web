server {
    listen 80;
    server_name web.wazzifni.net;

    root /usr/share/nginx/html;
    index index.html;

    # Use a resolver to handle dynamic DNS resolution for proxy_pass with variables
    # 127.0.0.11 is the Docker internal DNS. 8.8.8.8 is Google's DNS.
    resolver 127.0.0.11 8.8.8.8 valid=30s;

    # Support for the main website (Landing Page)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Support for the course application
    location /course/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /course/index.html;
    }

    # API Proxy for the main site
    location /api-proxy/ {
        set $ad_backend "https://ad.wazzifni.net/api/";
        proxy_pass $ad_backend;
        proxy_set_header Host ad.wazzifni.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    location /wazzifni-proxy/ {
        set $api_backend "https://api.wazzifni.net/api/";
        proxy_pass $api_backend;
        proxy_set_header Host api.wazzifni.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # Optional: Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error handling
    error_page 404 /index.html;
}
