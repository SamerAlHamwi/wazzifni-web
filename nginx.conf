server {
    listen 80;
    server_name web.wazzifni.net;

    root /usr/share/nginx/html;
    index index.html;

    # Use a resolver to handle dynamic DNS resolution
    # 127.0.0.11 is Docker's DNS. ipv6=off prevents some common 502 issues.
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

    # Support for the main website (Landing Page)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Support for the course application
    location /course/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /course/index.html;
    }

    # API Proxy for the main site
    location /api-proxy/ {
        set $ad_host "ad.wazzifni.net";
        # Rewrite /api-proxy/some-path to /api/some-path
        rewrite ^/api-proxy/(.*)$ /api/$1 break;
        proxy_pass https://$ad_host;
        proxy_set_header Host $ad_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name $ad_host;
    }

    location /wazzifni-proxy/ {
        set $api_host "api.wazzifni.net";
        # Rewrite /wazzifni-proxy/some-path to /api/some-path
        rewrite ^/wazzifni-proxy/(.*)$ /api/$1 break;
        proxy_pass https://$api_host;
        proxy_set_header Host $api_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_name $api_host;

        # Increase timeouts for slow backend responses
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error handling
    error_page 404 /index.html;
}
